<!DOCTYPE html>
<html>
<head>
    <title>Threat Intelligence Dashboard</title>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1 class="title">Threat Intelligence Dashboard</h1>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Scans</h3>
            <p id="totalScans">0</p>
        </div>

        <div class="card phishing">
            <h3>Phishing Detected</h3>
            <p id="phishingCount">0</p>
        </div>

        <div class="card safe">
            <h3>Safe Websites</h3>
            <p id="safeCount">0</p>
        </div>
    </div>

    <div class="chart-card card">
        <canvas id="threatChart"></canvas>
    </div>

    <div class="card table-card">
        <h2>Recent Scan Activity</h2>
        <table id="scanTable">
            <thead>
                <tr>
                    <th>URL</th>
                    <th>Prediction</th>
                    <th>Risk %</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
